<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red de Cursos — Ingeniería en Materiales (Plan 1217)</title>

  <link rel="stylesheet" href="simple-table.css">
  <link rel="stylesheet" href="simple-details.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body { overflow: hidden; height: 100vh; font-family: sans-serif; }

    #split { width: 100vw; height: 100vh; }

    #svg-panel {
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
      position: relative;
    }

    #svg-panel object {
      width: 100%;
      height: 100%;
      display: block;
    }

    #table-panel {
      background: #f5f5f5;
      padding: 15px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #table-panel h3 {
      font-size: 12px;
      color: #555;
      font-weight: 600;
      flex-shrink: 0;
    }

    #tabla { flex: 1; }

    .gutter.gutter-vertical {
      background: #4a90e2;
      cursor: row-resize;
      height: 6px !important;
    }
    .gutter.gutter-vertical:hover { background: #357abd; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/split.js@1.6.5/dist/split.min.js"></script>
  <script src="simple-table.js"></script>
</head>
<body>
  <div id="split">
    <div id="svg-panel">
      <object id="svg-object" type="image/svg+xml" data="red_cursos.svg"></object>
    </div>
    <div id="table-panel">
      <h3>
        Plan de Estudios — Ingeniería en Materiales (TEC, Plan 1217) &nbsp;·&nbsp;
        Clic para seleccionar &nbsp;·&nbsp; Ctrl+clic para selección múltiple &nbsp;·&nbsp;
        Doble clic para ver detalle &nbsp;·&nbsp; Filtrá por columna con los campos de texto
      </h3>
      <div id="tabla"></div>
    </div>
  </div>

  <script src="svg-controls.js"></script>
  <script src="simple-details.js"></script>

  <script>
    let table      = null;
    let svgControl = null;

    // Mapas de vinculación SVG ↔ tabla
    const svgToRowId  = new Map();  // "node-MA1001" → "row-MA1001"
    const rowToSvgIds = new Map();  // "row-MA1001"  → ["node-MA1001"]

    function loadDataFromSVG() {
      const svgObject = document.getElementById('svg-object');

      svgObject.addEventListener('load', function () {
        const svgDoc = svgObject.contentDocument;
        if (!svgDoc) {
          console.error('No se pudo acceder al documento SVG');
          return;
        }

        // ── 1. Construir mapas SVG ↔ row desde href en los nodos ────────────
        svgToRowId.clear();
        rowToSvgIds.clear();

        // Primero intentar desde v:row hrefs (estándar ODViz)
        const vRows = svgDoc.getElementsByTagName('v:row');
        for (let row of vRows) {
          const rowId = row.getAttribute('id');
          const hrefs = row.getAttribute('hrefs');
          if (rowId && hrefs) {
            const ids = hrefs.split(',').map(h => h.trim()).filter(Boolean);
            rowToSvgIds.set(rowId, ids);
            ids.forEach(svgId => svgToRowId.set(svgId, rowId));
          }
        }

        // Fallback: leer href desde los elementos SVG directamente
        if (svgToRowId.size === 0) {
          svgDoc.querySelectorAll('[href]').forEach(el => {
            const href = el.getAttribute('href');
            if (href && href.startsWith('#') && el.id) {
              const rowId = href.substring(1);
              svgToRowId.set(el.id, rowId);
              if (!rowToSvgIds.has(rowId)) rowToSvgIds.set(rowId, []);
              rowToSvgIds.get(rowId).push(el.id);
            }
          });
        }

        // ── 2. Leer v:table con los datos
        let factTable = null;
        const allTables = svgDoc.getElementsByTagName('v:table');
        for (let t of allTables) {
          if (t.getAttribute('visualization') === 'chart') {
            factTable = t;
            break;
          }
        }

        if (!factTable) {
          console.error('<v:table visualization="chart"> no encontrada en el SVG');
          return;
        }

        const columnNames = factTable.getAttribute('columns')
          .split(',').map(c => c.trim());

        const rows   = factTable.getElementsByTagName('v:row');
        const data   = [];

        for (let row of rows) {
          const rowId  = row.getAttribute('id');
          const parts  = row.textContent.trim().split(',');
          const record = { _rowId: rowId };
          columnNames.forEach((col, idx) => {
            const val = (parts[idx] || '').trim();
            record[col] = (val !== '' && !isNaN(val)) ? parseFloat(val) : val;
          });
          data.push(record);
        }

        if (data.length === 0) {
          console.error('Sin filas de datos en v:table');
          return;
        }

        // ── 3. Definir columnas para SimpleTable 
        const columns = columnNames
          .filter(c => c !== 'id')   // sigla ya actúa como ID visible
          .map(key => ({
            field: key,
            title: {
              sigla:    'Sigla',
              nombre:   'Nombre',
              semestre: 'Semestre',
              creditos: 'Créditos',
              horas:    'Horas',
              area:     'Área'
            }[key] || key.charAt(0).toUpperCase() + key.slice(1),
            width: `${100 / (columnNames.length - 1)}%`
          }));

        // ── 4. Instanciar SimpleDetail (doble clic → detalle en demanda)
        const detailBox = new SimpleDetail({ title: 'Detalle del Curso' });

        // ── 5. Instanciar SimpleTable 
        table = new SimpleTable('tabla', {
          data:       data,
          columns:    columns,
          selectable: true,
          height:     '100%',

          // Selección en tabla → resaltar en SVG
          onRowSelect: (selectedRows) => {
            if (!svgControl) return;
            const targetSvgIds = [];
            selectedRows.forEach(row => {
              const ids = rowToSvgIds.get(row._rowId) || [];
              targetSvgIds.push(...ids);
            });
            svgControl.selectMultiple(targetSvgIds);
          },

          // Doble clic en fila de tabla → detalle
          onRowDblClick: (rowData) => {
            detailBox.show(rowData, columns);
          },

          // Filtro en tabla → ocultar/mostrar nodos y enlaces en SVG
          onFilter: (filteredRows) => {
            if (!svgControl) return;
            const visibleSvgIds = filteredRows.flatMap(
              row => rowToSvgIds.get(row._rowId) || []
            );
            svgControl.filterByIds(visibleSvgIds);
          }
        });

        // ── 6. Conectar svg-controls cuando esté listo 
        const connectSVGControl = () => {
          if (!svgObject.__SVGControl) {
            setTimeout(connectSVGControl, 50);
            return;
          }

          svgControl = svgObject.__SVGControl;

          // Clic en nodo SVG → seleccionar fila en tabla
          svgControl.setCallback('select', (svgElement) => {
            if (!table) return;
            table.selectedRows.clear();
            if (svgElement && svgToRowId.has(svgElement.id)) {
              const rowId    = svgToRowId.get(svgElement.id);
              const targetRow = table.data.find(
                r => String(r._rowId) === String(rowId)
              );
              if (targetRow) table.selectedRows.add(targetRow);
            }
            table.render();
          });

          // Selección múltiple en SVG (Ctrl+clic) → marcar filas en tabla
          svgControl.setCallback('multiSelect', (svgElements) => {
            if (!table) return;
            table.selectedRows.clear();
            svgElements.forEach(el => {
              if (el && svgToRowId.has(el.id)) {
                const rowId = svgToRowId.get(el.id);
                const targetRow = table.data.find(
                  r => String(r._rowId) === String(rowId)
                );
                if (targetRow) table.selectedRows.add(targetRow);
              }
            });
            table.render();
            if (typeof table.options.onRowSelect === 'function') {
              table.options.onRowSelect(Array.from(table.selectedRows));
            }
          });

          // Doble clic en nodo SVG → detalle en demanda
          svgControl.setCallback('dblclick', (svgElement) => {
            if (!table || !svgElement) return;
            const rowId = svgToRowId.get(svgElement.id);
            if (!rowId) return;
            const row = table.data.find(
              r => String(r._rowId) === String(rowId)
            );
            if (row) detailBox.show(row, columns);
          });
        };

        connectSVGControl();
      });
    }

    // ── Split panel vertical 
    Split(['#svg-panel', '#table-panel'], {
      sizes:     [55, 45],
      direction: 'vertical',
      gutterSize: 6,
      minSize:   [100, 150]
    });

    loadDataFromSVG();
  </script>
</body>
</html>
